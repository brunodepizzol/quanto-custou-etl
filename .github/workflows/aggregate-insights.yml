name: Aggregate Insights Feed

on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Limite maximo de itens no feed final"
        required: false
        default: "300"
      max_bytes:
        description: "Limite maximo de tamanho do feed final (bytes)"
        required: false
        default: "1048576"
      max_drop_rate:
        description: "Taxa maxima de descarte aceitavel (0-1)"
        required: false
        default: "0.80"
  push:
    branches:
      - main
    paths:
      - "data/**/insights/home-insights.json"
      - "scripts/global_insights/**"
      - ".github/workflows/aggregate-insights.yml"
      - "requirements.txt"
  workflow_run:
    workflows:
      - Build ETL Camara
    types:
      - completed

concurrency:
  group: aggregate-insights-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  aggregate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VALIDATE_STRICT_GOVERNANCE: "1"
      HOME_INSIGHTS_SCHEMA_VERSION: "1.0.0"
      HOME_INSIGHTS_FEED_MAX_ITEMS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_items || '300' }}
      HOME_INSIGHTS_FEED_MAX_BYTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_bytes || '1048576' }}
      HOME_INSIGHTS_FEED_MAX_DROP_RATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_drop_rate || '0.80' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Test aggregator logic (fixture)
        env:
          PYTHONPATH: scripts
        run: python -m global_insights.tests.test_aggregate_insights_logic

      - name: Build catalog/index/feed
        env:
          PYTHONPATH: scripts
        run: python -m global_insights.aggregate_insights_feed --data-dir data

      - name: Validate aggregated feed
        env:
          PYTHONPATH: scripts
        run: python -m global_insights.validate_global_insights_feed --data-dir data

      - name: Monitor feed emptiness
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          feed_path = Path("data/home-insights-feed.json")
          index_path = Path("data/home-insights-index.json")
          if not feed_path.exists():
            raise SystemExit("home-insights-feed.json nao encontrado apos agregacao")
          if not index_path.exists():
            raise SystemExit("home-insights-index.json nao encontrado apos agregacao")

          feed_obj = json.loads(feed_path.read_text(encoding="utf-8"))
          index_obj = json.loads(index_path.read_text(encoding="utf-8"))
          items = feed_obj.get("items") or []
          source_items = index_obj.get("items") or []
          count = len(items)
          source_count = len(source_items)
          strict = str(os.getenv("VALIDATE_STRICT_GOVERNANCE", "0")).strip() == "1"
          max_bytes = int((os.getenv("HOME_INSIGHTS_FEED_MAX_BYTES") or "1048576").strip())
          size_bytes = feed_path.stat().st_size
          print(f"[monitor] home-insights-feed items: {count}")
          print(f"[monitor] home-insights-index sources: {source_count}")
          print(f"[monitor] home-insights-feed size_bytes: {size_bytes}")
          if count == 0:
            msg = "home-insights-feed.json gerado sem itens."
            print(f"::warning::{msg}")
            # Sem fontes ainda publicadas: comportamento operacional aceitavel.
            if strict and source_count > 0:
              raise SystemExit(f"{msg} VALIDATE_STRICT_GOVERNANCE=1")
          if max_bytes > 0 and size_bytes > max_bytes:
            msg = f"home-insights-feed.json excede limite de tamanho: {size_bytes} > {max_bytes}"
            print(f"::warning::{msg}")
            if strict:
              raise SystemExit(f"{msg} VALIDATE_STRICT_GOVERNANCE=1")
          PY

      - name: Commit and push
        run: |
          git config user.name "quantocustou-bot"
          git config user.email "quantocustou-bot@users.noreply.github.com"
          git add -f data/catalog.json data/home-insights-index.json data/home-insights-feed.json
          if git diff --cached --quiet; then
            echo "No aggregate changes to commit"
            exit 0
          fi
          git commit -m "Atualiza agregacao global de insights"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              exit 0
            fi
            sleep 5
          done
          echo "Push failed after retries"
          exit 1
